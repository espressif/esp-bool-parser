name: Test Build Docs

on:
  pull_request:

jobs:
  build-docs:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.7'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flit
          flit install -s
      - name: Build the docs
        run: |
          sphinx-build -b html docs/en build/docs
