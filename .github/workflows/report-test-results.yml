name: Report
on:
  workflow_run:
    workflows:
      - Test ESP bool parser
    types:
      - completed

permissions:
  actions: read
  checks: write
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Download test reports
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          path: artifacts

      - name: Read PR number
        run: |
          # The PR number is duplicated across artifacts, we just need one
          PR_NUMBER_FILE=$(find artifacts -name "pr_number.txt" | head -n 1)
          if [ -n "$PR_NUMBER_FILE" ] && [ -f "$PR_NUMBER_FILE" ]; then
            echo "PR_NUMBER=$(cat $PR_NUMBER_FILE)" >> $GITHUB_ENV
          else
            echo "pr_number.txt not found, skipping comment."
            exit 0
          fi

      - name: Generate multiple-files string
        id: generate-files-string
        run: |
          MULTIPLE_FILES=""
          for path in artifacts/test-results-*/pytest-coverage-*.txt; do
            dir=$(dirname "$path")
            slug=$(basename "$dir" | sed 's/^test-results-//')
            cov_file="$path"
            xml_file="$dir/pytest-$slug.xml"
            if [ -f "$cov_file" ] && [ -f "$xml_file" ]; then
              MULTIPLE_FILES="${MULTIPLE_FILES}${slug}, ${cov_file}, ${xml_file}"$'\n'
            fi
          done

          # Use GitHub environment file for multiline string
          echo "MULTIPLE_FILES<<EOF" >> $GITHUB_ENV
          echo "$MULTIPLE_FILES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Comment on PR
        # We only want to comment if there was a PR number retrieved
        if: env.PR_NUMBER != '' && env.MULTIPLE_FILES != ''
        uses: MishaKav/pytest-coverage-comment@v1
        with:
          issue-number: ${{ env.PR_NUMBER }}
          multiple-files: ${{ env.MULTIPLE_FILES }}
